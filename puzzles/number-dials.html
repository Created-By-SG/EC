<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg2:#0D1526;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--accent-light:#93C5FD;--accent-dim:rgba(59,130,246,0.15);--accent-border:rgba(59,130,246,0.3);
  --teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);--border3:rgba(255,255,255,0.06);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:24px;min-height:100vh;}

.dials{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.dial{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dial-btn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px 12px;transition:color 0.15s;border-radius:4px;}
.dial-btn:hover{color:var(--text);background:var(--bg3);}
.dial-digit{width:52px;height:60px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:500;font-family:var(--font-mono);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;letter-spacing:0.05em;transition:border-color 0.15s;}
.dial-digit.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.submit-btn{padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.15s,opacity 0.15s;width:100%;max-width:280px;}
.submit-btn:hover{background:#2563eb;}
.reset-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:var(--accent-border);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:10px;padding:28px 20px;background:var(--bg3);border:1px solid rgba(16,185,129,0.3);border-radius:12px;text-align:center;width:100%;max-width:320px;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div class="dials" id="dials"></div>
<button class="submit-btn" id="submitBtn" onclick="submit()">Unlock</button>
<button class="reset-btn" onclick="reset()">Reset</button>
<div class="solved-box" id="solvedBox">
  <div class="solved-title">Confirmed</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { digits: 4, scramble: [0,0,0,0], answer: [1,2,3,4], solvedMessage: 'Correct.' }
let values = []
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = e.data.config; init() }
})

function init() {
  values = [...config.scramble]
  render()
}

function render() {
  const c = document.getElementById('dials')
  c.innerHTML = ''
  values.forEach((v, i) => {
    const d = document.createElement('div')
    d.className = 'dial'
    d.innerHTML = `
      <button class="dial-btn" onclick="change(${i},1)">▲</button>
      <div class="dial-digit" id="digit-${i}">${v}</div>
      <button class="dial-btn" onclick="change(${i},-1)">▼</button>`
    c.appendChild(d)
  })
}

function change(i, dir) {
  if (solved) return
  values[i] = (values[i] + dir + 10) % 10
  document.getElementById(`digit-${i}`).textContent = values[i]
}

function submit() {
  if (solved) return
  const correct = config.answer.every((v, i) => values[i] === v)
  if (correct) {
    solved = true
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('submitBtn').style.display = 'none'
    document.getElementById('dials').style.opacity = '0.4'
    window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*')
  } else {
    document.querySelectorAll('.dial-digit').forEach(d => {
      d.classList.remove('shake')
      void d.offsetWidth
      d.classList.add('shake')
    })
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

function reset() {
  if (solved) return
  values = [...config.scramble]
  render()
}

init()
</script>
</body>
</html>
