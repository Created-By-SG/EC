<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;--amber:#F59E0B;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100%;overflow-y:auto;}
body{display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px;}

.hint-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.3px;max-width:300px;line-height:1.6;}
.hint-text strong{color:var(--amber);}

.maze-wrap{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:12px;
  display:inline-block;
}
.maze-grid{display:grid;gap:3px;}
.maze-cell{
  width:40px;height:40px;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:background 0.12s;
}
.maze-cell.wall{background:rgba(255,255,255,0.02);border:1px solid transparent;}
.maze-cell.open{background:var(--bg4);border:1px solid var(--border);}
.maze-cell.player{background:rgba(59,130,246,0.18);border:1px solid var(--accent);}
.maze-cell.exit{background:rgba(16,185,129,0.12);border:1px solid var(--teal);}
.maze-cell.trap{background:rgba(239,68,68,0.14);border:1px solid var(--red);}
.maze-cell.visited{background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.07);}
.maze-cell.visited-trap{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);}

/* Move counter */
.move-counter{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;}

/* Arrow controls */
.controls{display:flex;flex-direction:column;align-items:center;gap:4px;}
.controls-row{display:flex;gap:4px;}
.dir-btn{
  width:52px;height:52px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--text);
  font-size:22px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
  touch-action:manipulation;
  -webkit-user-select:none;
}
.dir-btn:hover{background:var(--bg4);}
.dir-btn:active{background:rgba(59,130,246,0.15);}

.reset-btn{
  padding:8px 20px;background:transparent;
  border:1px solid var(--border2);border-radius:6px;
  color:var(--muted);font-family:var(--font-mono);font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  transition:all 0.15s;
}
.reset-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

.feedback{font-family:var(--font-mono);font-size:11px;text-align:center;min-height:16px;color:var(--muted);}
.feedback.err{color:var(--red);}
.feedback.ok{color:var(--teal);}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:8px;
  padding:20px 24px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;max-width:300px;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.5;}
</style>
</head>
<body>

<div class="hint-text">Navigate ● to ★. Avoid traps (✕).<br><strong>Check the map item in your sack.</strong></div>

<div class="maze-wrap">
  <div class="maze-grid" id="mazeGrid"></div>
</div>

<div class="move-counter" id="moveCounter">Moves: 0</div>

<div class="controls">
  <div class="controls-row">
    <button class="dir-btn" onclick="move('up')">↑</button>
  </div>
  <div class="controls-row">
    <button class="dir-btn" onclick="move('left')">←</button>
    <button class="dir-btn" onclick="move('down')">↓</button>
    <button class="dir-btn" onclick="move('right')">→</button>
  </div>
</div>

<div class="feedback" id="feedback"></div>
<button class="reset-btn" onclick="resetMaze()">Reset Maze</button>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Pattern Found</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
// Default config — complex 7x7 maze
// Grid values: 0=wall, 1=open, 2=trap, 3=exit
// Solution path (without map this is nearly impossible — 14 traps, many dead ends):
// R, D, D, R, R, D, R, D, D, L, D, R, R, D, R  →  exit at (6,6)
// Without the map item showing trap positions, players will hit traps constantly

let config = {
  cols: 7,
  rows: 7,
  // 0=wall  1=open  2=trap  3=exit
  grid: [
    [1, 1, 2, 1, 1, 2, 1],
    [2, 1, 1, 2, 1, 1, 2],
    [1, 2, 1, 1, 2, 1, 1],
    [1, 1, 2, 1, 1, 1, 2],
    [2, 1, 1, 2, 1, 2, 1],
    [1, 2, 1, 1, 1, 1, 1],
    [1, 1, 2, 1, 2, 1, 3],
  ],
  startRow: 0,
  startCol: 0,
  solvedTitle: 'Pattern Found',
  solvedMessage: 'The trap placement spells something out. The map was telling you all along.',
}

let pos = { r: 0, c: 0 }
let visited = new Set()
let moves = 0
let done = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') {
    config = { ...config, ...e.data.config }
    resetMaze()
  }
})

function key(r, c) { return `${r},${c}` }

function resetMaze() {
  pos = { r: config.startRow || 0, c: config.startCol || 0 }
  visited = new Set([key(pos.r, pos.c)])
  moves = 0
  done = false
  document.getElementById('feedback').textContent = ''
  document.getElementById('feedback').className = 'feedback'
  document.getElementById('solvedBox').style.display = 'none'
  updateMoveCounter()
  render()
}

function render() {
  const grid = document.getElementById('mazeGrid')
  grid.style.gridTemplateColumns = `repeat(${config.cols}, 40px)`
  grid.innerHTML = ''

  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      const cell = document.createElement('div')
      cell.className = 'maze-cell'
      const isPlayer = pos.r === r && pos.c === c
      const val = config.grid[r][c]
      const wasVisited = visited.has(key(r, c)) && !isPlayer

      if (val === 0) {
        cell.classList.add('wall')
      } else if (isPlayer) {
        cell.classList.add('player')
        cell.textContent = '●'
      } else if (val === 3) {
        cell.classList.add('exit')
        cell.textContent = '★'
      } else if (wasVisited && val === 2) {
        cell.classList.add('visited-trap')
        cell.textContent = '✕'
      } else if (wasVisited) {
        cell.classList.add('visited')
      } else {
        cell.classList.add('open')
      }

      grid.appendChild(cell)
    }
  }
}

function updateMoveCounter() {
  document.getElementById('moveCounter').textContent = `Moves: ${moves}`
}

function move(dir) {
  if (done) return
  let { r, c } = pos
  if (dir === 'up') r--
  if (dir === 'down') r++
  if (dir === 'left') c--
  if (dir === 'right') c++

  const fb = document.getElementById('feedback')

  // Bounds check
  if (r < 0 || r >= config.rows || c < 0 || c >= config.cols) {
    fb.textContent = "Can't go that way."
    fb.className = 'feedback'
    return
  }

  const val = config.grid[r][c]

  // Wall
  if (val === 0) {
    fb.textContent = "Blocked."
    fb.className = 'feedback'
    return
  }

  pos = { r, c }
  visited.add(key(r, c))
  moves++
  updateMoveCounter()
  render()

  if (val === 2) {
    fb.textContent = 'Trap. Back to start.'
    fb.className = 'feedback err'
    setTimeout(resetMaze, 900)
  } else if (val === 3) {
    done = true
    fb.textContent = ''
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Pattern Found'
    document.getElementById('solvedMsg').textContent = config.solvedMessage || ''
    document.getElementById('solvedBox').classList.add('show')
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    fb.textContent = ''
    fb.className = 'feedback'
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' }
  if (map[e.key]) { e.preventDefault(); move(map[e.key]) }
})

resetMaze()
</script>
</body>
</html>
