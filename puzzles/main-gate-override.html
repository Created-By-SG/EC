<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;
  --border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:16px;min-height:100vh;}

.hint-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.3px;}

.router-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.router-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.router-label.live{color:var(--teal);}
.router-grid{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(3,72px);gap:4px;background:var(--bg3);padding:12px;border:1px solid var(--border2);border-radius:12px;}
.router-tile{width:72px;height:72px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;overflow:hidden;}
.router-tile:hover{background:var(--bg3);}
.router-tile.lit{background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.3);}

.reset-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:rgba(59,130,246,0.3);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:10px;padding:24px 20px;background:var(--bg3);border:1px solid rgba(16,185,129,0.3);border-radius:12px;text-align:center;width:100%;max-width:300px;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<p class="hint-text">Tap tiles to rotate. Connect power from top-left to bottom-right.</p>

<div class="router-wrap">
  <div class="router-label" id="outLabel">▲ entry — route power to exit ▼</div>
  <div class="router-grid" id="routerGrid"></div>
  <div class="router-label" id="exitLabel">▼ exit</div>
</div>

<button class="reset-btn" onclick="resetRouter()">Scramble</button>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Gate Relay Connected</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  solvedTitle: 'Gate Relay Connected',
  solvedMessage: 'Power routed successfully. Gate is open.',
}
const TYPES = ['corner','straight','corner','corner','corner','straight','corner','straight','straight']
const OPP = [2,3,0,1], OFF = [-3,1,3,-1]
let rots = [], locked = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; resetRouter() }
})

function openings(type, rot) {
  if (type === 'straight') return rot % 2 === 0 ? [0,2] : [1,3]
  return [[0,1],[1,2],[2,3],[3,0]][rot % 4]
}

function getConnected() {
  if (!openings(TYPES[0], rots[0]).includes(0)) return new Set()
  const visited = new Set([0]), q = [0]
  while (q.length) {
    const cur = q.shift()
    for (const dir of openings(TYPES[cur], rots[cur])) {
      if (dir === 1 && cur % 3 === 2) continue
      if (dir === 3 && cur % 3 === 0) continue
      const nb = cur + OFF[dir]
      if (nb < 0 || nb > 8 || visited.has(nb)) continue
      if (openings(TYPES[nb], rots[nb]).includes(OPP[dir])) { visited.add(nb); q.push(nb) }
    }
  }
  return visited
}

function tileSVG(type, rot, lit) {
  const c = lit ? '#3B82F6' : 'rgba(59,130,246,0.18)'
  const rects = type === 'straight'
    ? `<rect x="23" y="0" width="14" height="64" fill="${c}" rx="3"/>`
    : `<rect x="23" y="0" width="14" height="41" fill="${c}" rx="3"/>
       <rect x="23" y="23" width="41" height="14" fill="${c}" rx="3"/>`
  return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"
    style="width:100%;height:100%;transform:rotate(${rot*90}deg);transition:transform 0.2s ease">
    ${rects}</svg>`
}

function build() {
  const grid = document.getElementById('routerGrid')
  grid.innerHTML = ''
  TYPES.forEach((_, i) => {
    const el = document.createElement('div')
    el.className = 'router-tile'
    el.id = 'rtile-' + i
    el.onclick = () => spin(i)
    grid.appendChild(el)
  })
  render()
}

function render() {
  const connected = getConnected()
  const isSolved = connected.has(8) && openings(TYPES[8], rots[8]).includes(2)
  TYPES.forEach((type, i) => {
    const el = document.getElementById('rtile-' + i)
    el.innerHTML = tileSVG(type, rots[i], connected.has(i))
    el.classList.toggle('lit', connected.has(i))
  })
  const lbl = document.getElementById('outLabel')
  if (isSolved) {
    lbl.className = 'router-label live'
    lbl.textContent = '▲ entry — CONNECTED ▼'
  } else {
    lbl.className = 'router-label'
    lbl.textContent = '▲ entry — route power to exit ▼'
  }
  if (isSolved && !locked) {
    locked = true
    setTimeout(() => {
      document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Gate Relay Connected'
      document.getElementById('solvedMsg').textContent = config.solvedMessage
      document.getElementById('solvedBox').classList.add('show')
      window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*')
    }, 500)
  }
}

function spin(i) {
  if (locked) return
  rots[i] = (rots[i] + 1) % 4
  render()
}

function resetRouter() {
  locked = false
  document.getElementById('solvedBox').classList.remove('show')
  do {
    rots = TYPES.map(() => Math.floor(Math.random() * 4))
  } while (getConnected().has(8) && openings(TYPES[8], rots[8]).includes(2))
  build()
}

resetRouter()
</script>
</body>
</html>
