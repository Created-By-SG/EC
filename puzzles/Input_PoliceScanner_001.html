<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;--amber:#F59E0B;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;}

.scanner{
  width:100%;max-width:340px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:12px;
  overflow:hidden;
}

.scanner-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 10px;
  background:rgba(0,0,0,0.25);
}
.scanner-brand{font-family:var(--font-mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.scanner-status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:9px;color:var(--muted);}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--amber);
  animation:pulse 1.4s ease-in-out infinite;
}
.status-dot.locked{background:var(--teal);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Scope */
.scope{width:100%;height:110px;background:#020408;position:relative;}
.scope canvas{display:block;width:100%;height:110px;}

/* Controls */
.controls{padding:16px 16px 18px;display:flex;flex-direction:column;gap:16px;}

.ch{display:flex;flex-direction:column;gap:8px;}
.ch-header{display:flex;align-items:center;justify-content:space-between;}
.ch-label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.ch-value{display:flex;align-items:baseline;gap:3px;}
.ch-num{font-family:var(--font-mono);font-size:16px;font-weight:500;color:var(--text);}
.ch-unit{font-family:var(--font-mono);font-size:9px;color:var(--muted);}

/* Slider */
.sl-track{position:relative;height:4px;background:var(--bg4);border-radius:2px;}
input[type=range]{
  position:absolute;top:50%;left:0;width:100%;height:100%;
  transform:translateY(-50%);
  -webkit-appearance:none;appearance:none;
  background:transparent;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:var(--accent);
  border:2px solid var(--bg);
}
.sl-fill{
  position:absolute;top:0;left:0;height:100%;
  background:var(--accent);border-radius:2px;
  pointer-events:none;
}

.submit-btn{
  width:100%;max-width:340px;
  padding:14px;background:var(--accent);border:none;border-radius:8px;
  color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:background 0.15s,opacity 0.15s;
}
.submit-btn:hover{background:#2563EB;}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}

.feedback{
  font-family:var(--font-mono);font-size:11px;
  color:var(--muted);text-align:center;min-height:14px;
  max-width:340px;
}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:6px;
  padding:14px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;max-width:340px;width:100%;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="scanner">
  <div class="scanner-top">
    <span class="scanner-brand">Police Scanner</span>
    <div class="scanner-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Scanning...</span>
    </div>
  </div>

  <div class="scope">
    <canvas id="scopeCanvas"></canvas>
  </div>

  <div class="controls">
    <div class="ch">
      <div class="ch-header">
        <span class="ch-label">Frequency</span>
        <div class="ch-value">
          <span class="ch-num" id="freqNum">50</span>
          <span class="ch-unit">Hz</span>
        </div>
      </div>
      <div class="sl-track">
        <div class="sl-fill" id="freqFill" style="width:33%"></div>
        <input type="range" id="freqSlider" min="0" max="150" value="50" oninput="update()">
      </div>
    </div>

    <div class="ch">
      <div class="ch-header">
        <span class="ch-label">Amplitude</span>
        <div class="ch-value">
          <span class="ch-num" id="ampNum">30</span>
          <span class="ch-unit">%</span>
        </div>
      </div>
      <div class="sl-track">
        <div class="sl-fill" id="ampFill" style="width:30%"></div>
        <input type="range" id="ampSlider" min="0" max="100" value="30" oninput="update()">
      </div>
    </div>
  </div>
</div>

<button class="submit-btn" id="submitBtn" onclick="check()">Intercept Signal</button>
<div class="feedback" id="feedback"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Signal Intercepted</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  targetFreq: 73,
  targetAmp: 42,
  tolerance: 1,
  solvedTitle: 'Signal Intercepted',
  solvedMessage: 'Broadcast channel open. Ready to transmit.',
}
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; update() }
})

const canvas = document.getElementById('scopeCanvas')
const ctx    = canvas.getContext('2d')

function resize() {
  canvas.width  = canvas.offsetWidth  || 340
  canvas.height = 110
}
window.addEventListener('resize', () => { resize(); draw() })
resize()

function update() {
  const f = +document.getElementById('freqSlider').value
  const a = +document.getElementById('ampSlider').value
  document.getElementById('freqNum').textContent = f
  document.getElementById('ampNum').textContent  = a
  document.getElementById('freqFill').style.width = (f / 150 * 100) + '%'
  document.getElementById('ampFill').style.width  = a + '%'
  draw()
  document.getElementById('feedback').textContent = ''
}

function draw() {
  const W = canvas.width, H = canvas.height, mid = H / 2
  const f = +document.getElementById('freqSlider').value
  const a = +document.getElementById('ampSlider').value

  ctx.clearRect(0, 0, W, H)

  // Grid
  ctx.strokeStyle = 'rgba(59,130,246,0.06)'
  ctx.lineWidth = 1
  for (let x = 0; x < W; x += 28) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke() }
  for (let y = 0; y < H; y += 22) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke() }

  // Ghost target
  ctx.beginPath()
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'
  ctx.lineWidth = 1.5
  for (let x = 0; x <= W; x++) {
    const y = mid + (config.targetAmp * 0.38) * Math.sin(x * config.targetFreq * 0.0018)
    x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y)
  }
  ctx.stroke()

  // Player wave — always blue, no green feedback
  ctx.beginPath()
  ctx.strokeStyle = '#3B82F6'
  ctx.lineWidth = 2
  for (let x = 0; x <= W; x++) {
    const y = mid + (a * 0.38) * Math.sin(x * f * 0.0018)
    x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y)
  }
  ctx.stroke()
}

function check() {
  if (solved) return
  const f = +document.getElementById('freqSlider').value
  const a = +document.getElementById('ampSlider').value
  const fb = document.getElementById('feedback')

  if (Math.abs(f - config.targetFreq) <= config.tolerance &&
      Math.abs(a - config.targetAmp)  <= config.tolerance) {
    solved = true
    document.getElementById('statusDot').className = 'status-dot locked'
    document.getElementById('statusText').textContent = 'Locked'
    document.getElementById('submitBtn').disabled = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Signal Intercepted'
    document.getElementById('solvedMsg').textContent   = config.solvedMessage || ''
    document.getElementById('solvedBox').classList.add('show')
    fb.textContent = ''
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    fb.style.color = '#EF4444'
    fb.textContent = 'Signal not aligned. Adjust both channels.'
  }
}

update()
</script>
</body>
</html>
