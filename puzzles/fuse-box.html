<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:20px;min-height:100vh;}

.fuse-box{width:100%;max-width:380px;background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.fuse-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.fuse-title{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.power-light{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background 0.3s,box-shadow 0.3s;}
.power-light.on{background:var(--teal);box-shadow:0 0 8px var(--teal);}
.power-light.fail{background:var(--red);box-shadow:0 0 8px var(--red);}
.fuses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:1px;background:var(--border);}
.fuse-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--bg);cursor:pointer;transition:background 0.15s;}
.fuse-item:hover{background:var(--bg3);}
.fuse-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.55);text-align:center;}
.fuse-track{width:28px;height:50px;background:rgba(255,255,255,0.06);border-radius:14px;position:relative;transition:background 0.2s;}
.fuse-track.on{background:rgba(16,185,129,0.2);}
.fuse-knob{position:absolute;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.25);transition:top 0.2s,background 0.2s;}
.fuse-knob.up{top:4px;background:var(--teal);}
.fuse-knob.down{top:26px;}
.fuse-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);height:14px;}

.seq-track{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.seq-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--muted);transition:all 0.2s;}
.seq-dot.done{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.4);color:var(--teal);}
.seq-dot.bad{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.4);color:#fca5a5;}

.submit-btn{padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.15s;width:100%;max-width:280px;}
.submit-btn:hover{background:#2563eb;}
.reset-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:rgba(59,130,246,0.3);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:10px;padding:28px 20px;background:var(--bg3);border:1px solid rgba(16,185,129,0.3);border-radius:12px;text-align:center;width:100%;max-width:320px;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div class="fuse-box">
  <div class="fuse-top">
    <span class="fuse-title">Fuse Panel</span>
    <div class="power-light" id="powerLight"></div>
  </div>
  <div class="fuses-grid" id="fusesGrid"></div>
</div>

<div class="seq-track" id="seqTrack"></div>

<button class="submit-btn" id="submitBtn" style="display:none" onclick="confirm()">Confirm sequence</button>
<button class="reset-btn" onclick="resetFuses()">Reset</button>

<div class="solved-box" id="solvedBox">
  <div class="solved-title">Power restored</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { fuses:['A','B','C'], answer:['A','B','C'], solvedMessage:'Correct.' }
let state = {}
let sequence = []
let solved = false
let failed = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = e.data.config; init() }
})

function init() {
  state = Object.fromEntries(config.fuses.map(f => [f, false]))
  sequence = []
  renderFuses()
  renderSeq()
}

function renderFuses() {
  const grid = document.getElementById('fusesGrid')
  grid.innerHTML = ''
  config.fuses.forEach(name => {
    const on = state[name]
    const item = document.createElement('div')
    item.className = 'fuse-item'
    item.onclick = () => flip(name)
    item.innerHTML = `
      <div class="fuse-lbl">${name}</div>
      <div class="fuse-track${on?' on':''}">
        <div class="fuse-knob${on?' up':' down'}"></div>
      </div>
      <div class="fuse-num">${on ? sequence.indexOf(name)+1 : ''}</div>`
    grid.appendChild(item)
  })
}

function renderSeq() {
  const track = document.getElementById('seqTrack')
  track.innerHTML = ''
  config.answer.forEach((_, i) => {
    const dot = document.createElement('div')
    const filled = i < sequence.length
    const correct = filled && sequence[i] === config.answer[i]
    dot.className = 'seq-dot' + (filled ? (correct ? ' done' : ' bad') : '')
    dot.textContent = filled ? sequence[i].charAt(0) : i+1
    track.appendChild(dot)
  })
  document.getElementById('submitBtn').style.display =
    sequence.length === config.answer.length ? 'block' : 'none'
}

function flip(name) {
  if (solved) return
  if (state[name]) {
    state[name] = false
    sequence = sequence.filter(s => s !== name)
    failed = false
  } else {
    state[name] = true
    sequence = [...sequence, name]
  }
  renderFuses()
  renderSeq()
}

function confirm() {
  const correct = config.answer.every((v, i) => sequence[i] === v)
  if (correct) {
    solved = true
    document.getElementById('powerLight').classList.add('on')
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('submitBtn').style.display = 'none'
    window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*')
  } else {
    failed = true
    document.getElementById('powerLight').classList.add('fail')
    renderSeq()
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

function resetFuses() {
  if (solved) return
  state = Object.fromEntries(config.fuses.map(f => [f, false]))
  sequence = []
  failed = false
  document.getElementById('powerLight').className = 'power-light'
  renderFuses()
  renderSeq()
}

init()
</script>
</body>
</html>
