<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--accent-dim:rgba(59,130,246,0.15);--teal:#10B981;--red:#EF4444;
  --border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:20px;min-height:100vh;}

.hint-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.3px;max-width:280px;line-height:1.6;}

.matrix-grid{display:grid;gap:8px;padding:16px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;}
.matrix-cell{width:72px;height:72px;border-radius:10px;background:rgba(59,130,246,0.35);border:1px solid rgba(59,130,246,0.4);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.matrix-cell.on{background:rgba(59,130,246,0.12);border-color:var(--border2);}
.matrix-cell:active{transform:scale(0.93);}

.matrix-cell::after{
  content:'';width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  transition:all 0.15s;
}
.matrix-cell.on::after{background:transparent;box-shadow:none;}

.reset-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:rgba(59,130,246,0.3);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:10px;padding:28px 20px;background:var(--bg3);border:1px solid rgba(16,185,129,0.3);border-radius:12px;text-align:center;width:100%;max-width:320px;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<p class="hint-text">Tapping a node toggles it and all adjacent nodes. Turn all nodes OFF to breach the firewall.</p>
<div class="matrix-grid" id="matrixGrid"></div>
<button class="reset-btn" onclick="initMatrix()">Reset Matrix</button>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Firewall Breached</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  size: 3,
  solvedTitle: 'Firewall Breached',
  solvedMessage: 'Root access obtained. System is yours.',
}
let matrix = []
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; initMatrix() }
})

function initMatrix() {
  solved = false
  const M = config.size || 3
  const grid = document.getElementById('matrixGrid')
  grid.style.gridTemplateColumns = `repeat(${M}, 72px)`
  grid.innerHTML = ''
  document.getElementById('solvedBox').classList.remove('show')

  matrix = Array(M * M).fill(false)
  const cells = Array.from({length: M * M}, (_, i) => i)
  cells.sort(() => Math.random() - 0.5)
  cells.slice(0, M).forEach(idx => applyToggle(idx, M))
  if (matrix.every(v => !v)) applyToggle(Math.floor(M * M / 2), M)

  for (let i = 0; i < M * M; i++) {
    const cell = document.createElement('div')
    cell.className = 'matrix-cell' + (matrix[i] ? '' : ' on')
    cell.id = 'mcell-' + i
    cell.onclick = () => playerToggle(i)
    grid.appendChild(cell)
  }
}

function applyToggle(idx, M) {
  const size = M || config.size || 3
  const neighbors = [idx, idx - 1, idx + 1, idx - size, idx + size]
  neighbors.forEach(n => {
    if (n < 0 || n >= size * size) return
    if (n === idx - 1 && idx % size === 0) return
    if (n === idx + 1 && idx % size === size - 1) return
    matrix[n] = !matrix[n]
  })
}

function playerToggle(idx) {
  if (solved) return
  applyToggle(idx)
  const M = config.size || 3
  for (let i = 0; i < M * M; i++) {
    document.getElementById('mcell-' + i).className = 'matrix-cell' + (matrix[i] ? '' : ' on')
  }
  if (matrix.every(v => !v)) {
    solved = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('matrixGrid').style.opacity = '0.4'
    window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*')
  }
}

initMatrix()
</script>
</body>
</html>
