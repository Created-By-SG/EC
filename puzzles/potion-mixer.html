<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;
  --border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:20px;min-height:100vh;}

.target-row{display:flex;align-items:center;gap:10px;}
.target-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.target-swatch{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);}
.target-name{font-size:13px;color:var(--muted);}

.vials-row{display:flex;align-items:flex-end;gap:14px;justify-content:center;}
.vial-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.vial-outer{width:40px;height:100px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
.vial-fill{width:100%;transition:height 0.2s;}
.vial-btn{width:40px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:1.1rem;cursor:pointer;transition:background 0.15s;}
.vial-btn:hover{background:var(--bg4);}
.vial-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500;}
.v-divider{width:1px;height:100px;background:rgba(255,255,255,0.08);}
.mix-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.mix-outer{width:40px;height:100px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
.mix-fill{width:100%;transition:height 0.2s,background 0.2s;}
.mix-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

.submit-btn{padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.15s;width:100%;max-width:280px;}
.submit-btn:hover{background:#2563eb;}
.reset-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:color 0.15s,border-color 0.15s;}
.reset-btn:hover{color:var(--text);border-color:rgba(59,130,246,0.3);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:10px;padding:28px 20px;background:var(--bg3);border:1px solid rgba(16,185,129,0.3);border-radius:12px;text-align:center;width:100%;max-width:320px;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div class="target-row">
  <span class="target-label">Target</span>
  <div class="target-swatch" id="targetSwatch"></div>
  <span class="target-name" id="targetName"></span>
</div>

<div class="vials-row">
  <div class="vial-col">
    <div class="vial-outer"><div class="vial-fill" id="fillR" style="background:#8c3d3d;height:100%;"></div></div>
    <button class="vial-btn" onclick="pour('R')">+</button>
    <span class="vial-lbl" style="color:#b05555;">Red</span>
  </div>
  <div class="vial-col">
    <div class="vial-outer"><div class="vial-fill" id="fillB" style="background:#3d5a8c;height:100%;"></div></div>
    <button class="vial-btn" onclick="pour('B')">+</button>
    <span class="vial-lbl" style="color:#5577b0;">Blue</span>
  </div>
  <div class="vial-col">
    <div class="vial-outer"><div class="vial-fill" id="fillY" style="background:#8c7a3d;height:100%;"></div></div>
    <button class="vial-btn" onclick="pour('Y')">+</button>
    <span class="vial-lbl" style="color:#b0a055;">Yellow</span>
  </div>
  <div class="v-divider"></div>
  <div class="mix-col">
    <div class="mix-outer"><div class="mix-fill" id="mixFill"></div></div>
    <span class="mix-lbl">Mix</span>
  </div>
</div>

<button class="submit-btn" id="submitBtn" onclick="submit()">Submit formula</button>
<button class="reset-btn" onclick="resetMix()">Reset</button>
<div class="solved-box" id="solvedBox">
  <div class="solved-title">Formula matched</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { maxDrops:4, answer:{R:1,B:1,Y:0}, target:{color:'#6b5a8c',label:'Purple'}, solvedMessage:'Correct.' }
let drops = {R:0,B:0,Y:0}
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = e.data.config; init() }
})

function init() {
  drops = {R:0,B:0,Y:0}
  document.getElementById('targetSwatch').style.background = config.target.color
  document.getElementById('targetName').textContent = config.target.label
  updateDisplay()
}

function pour(c) {
  if (solved || drops[c] >= config.maxDrops) return
  drops[c]++
  updateDisplay()
}

function updateDisplay() {
  const max = config.maxDrops
  document.getElementById('fillR').style.height = `${((max-drops.R)/max)*100}%`
  document.getElementById('fillB').style.height = `${((max-drops.B)/max)*100}%`
  document.getElementById('fillY').style.height = `${((max-drops.Y)/max)*100}%`
  const total = drops.R+drops.B+drops.Y
  const mixHeight = Math.min((total/max)*100,100)
  const mf = document.getElementById('mixFill')
  mf.style.height = mixHeight+'%'
  mf.style.background = total ? mixColor(drops) : 'transparent'
}

function mixColor(d) {
  const t = d.R+d.B+d.Y
  if (!t) return 'transparent'
  const nr=d.R/t,nb=d.B/t,ny=d.Y/t
  const r=Math.min(255,Math.round(nr*140+nb*61+ny*140))
  const g=Math.min(255,Math.round(nr*61+nb*90+ny*122))
  const b=Math.min(255,Math.round(nr*61+nb*140+ny*61))
  return `rgb(${r},${g},${b})`
}

function submit() {
  if (solved) return
  const correct = Object.keys(config.answer).every(k => drops[k] === config.answer[k])
  if (correct) {
    solved = true
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('submitBtn').style.display = 'none'
    window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*')
  } else {
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

function resetMix() {
  if (solved) return
  drops = {R:0,B:0,Y:0}
  updateDisplay()
}

init()
</script>
</body>
</html>
