<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;--amber:#F59E0B;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w: min(calc(100vw - 32px), 340px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

html,body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  height:100dvh;overflow:hidden;
}
body{
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;
  padding:clamp(10px,2dvh,16px) 16px clamp(12px,2.5dvh,20px);
  gap:clamp(12px,2.5dvh,18px);
}

.panel{
  width:var(--card-w);
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  overflow:hidden;flex-shrink:1;min-height:0;
  display:flex;flex-direction:column;
}
.panel-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:rgba(0,0,0,0.25);flex-shrink:0;
}
.panel-label{font-family:var(--font-mono);font-size:clamp(8px,2.2vw,9px);letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.out-status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:clamp(8px,2.2vw,9px);color:var(--muted);}
.out-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);}

.vu-display{
  display:flex;justify-content:center;align-items:flex-end;gap:16px;
  padding:clamp(10px,2dvh,16px) 20px clamp(10px,2dvh,14px);
  background:#020408;
  height:40dvh;
  flex-shrink:1;min-height:0;
}
.vu-ch{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.vu-bar-wrap{
  width:22px;flex:1;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:3px;overflow:hidden;
  position:relative;
  height:100%;
}
.vu-target{
  position:absolute;left:0;right:0;height:2px;
  background:var(--amber);opacity:0.7;pointer-events:none;
}
.vu-fill{position:absolute;bottom:0;left:0;right:0;transition:height 0.12s,background 0.2s;border-radius:0 0 2px 2px;}
.vu-lbl{font-family:var(--font-mono);font-size:clamp(8px,2.2vw,9px);color:var(--muted);}

.sliders{
  padding:clamp(10px,2dvh,14px) 16px clamp(12px,2.5dvh,18px);
  display:flex;flex-direction:column;gap:clamp(16px,3dvh,22px);
  flex-shrink:0;
}
.sl-row{display:flex;align-items:center;gap:10px;min-height:42px;}
.sl-ch{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);width:12px;text-align:center;}
.sl-track{position:relative;flex:1;height:4px;background:var(--bg4);border-radius:2px;}
input[type=range]{
  position:absolute;top:50%;left:0;width:100%;height:36px;
  transform:translateY(-50%);
  -webkit-appearance:none;appearance:none;
  background:transparent;outline:none;cursor:pointer;
}
/* Slightly smaller than police scanner (30px) as requested */
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:30px;height:30px;border-radius:50%;
  background:var(--accent);
  border:3px solid var(--bg);
  box-shadow:0 0 0 2px var(--accent);
  transition:transform 0.1s;
}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15);}
input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);}
.sl-val{font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);color:var(--text);width:26px;text-align:right;}



.feedback{
  font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);
  color:var(--muted);text-align:center;min-height:14px;
  width:var(--card-w);flex-shrink:0;
}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);flex-shrink:0;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-top">
    <span class="panel-label">Sound Calibration</span>
    <div class="out-status">
      <div class="out-dot" id="outDot"></div>
      <span id="outText">Output off</span>
    </div>
  </div>

  <div class="vu-display" id="vuDisplay"></div>

  <div class="sliders" id="sliders"></div>
</div>

<div class="feedback" id="feedback"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Signal Broadcast</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  channels: [
    { label:'L', target:65, color:'#3B82F6' },
    { label:'C', target:40, color:'#10B981' },
    { label:'R', target:55, color:'#F59E0B' },
  ],
  tolerance: 3,
  solvedTitle: 'Signal Broadcast',
  solvedMessage: 'The loudspeaker crackles to life across the park.',
}
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
  if (e.data?.type === 'PUZZLE_SUBMIT') check()
})

function init() {
  solved = false
  buildVU()
  buildSliders()
  update()
}

function buildVU() {
  const wrap = document.getElementById('vuDisplay')
  wrap.innerHTML = ''
  config.channels.forEach((ch, i) => {
    const col = document.createElement('div')
    col.className = 'vu-ch'
    col.innerHTML = `
      <div class="vu-bar-wrap">
        <div class="vu-target" id="vt-${i}" style="bottom:${ch.target}%"></div>
        <div class="vu-fill" id="vf-${i}" style="height:50%;background:${ch.color}40"></div>
      </div>
      <span class="vu-lbl">${ch.label}</span>
    `
    wrap.appendChild(col)
  })
}

function buildSliders() {
  const wrap = document.getElementById('sliders')
  wrap.innerHTML = ''
  config.channels.forEach((ch, i) => {
    const row = document.createElement('div')
    row.className = 'sl-row'
    row.innerHTML = `
      <span class="sl-ch" style="color:${ch.color}">${ch.label}</span>
      <div class="sl-track">
        <input type="range" id="sl-${i}" min="0" max="100" value="50" oninput="update()">
      </div>
      <span class="sl-val" id="sv-${i}">50</span>
    `
    wrap.appendChild(row)
  })
}

function update() {
  config.channels.forEach((ch, i) => {
    const val = +document.getElementById(`sl-${i}`).value
    document.getElementById(`sv-${i}`).textContent = val
    document.getElementById(`vf-${i}`).style.height = val + '%'
    document.getElementById(`vf-${i}`).style.background = ch.color + '80'
  })
  document.getElementById('feedback').textContent = ''
}

function check() {
  if (solved) return
  const fb = document.getElementById('feedback')
  const allOk = config.channels.every((ch, i) => {
    const val = +document.getElementById(`sl-${i}`).value
    return Math.abs(val - ch.target) <= config.tolerance
  })

  if (allOk) {
    solved = true
    config.channels.forEach((_, i) => {
      document.getElementById(`vf-${i}`).style.background = '#10B981'
    })
    document.getElementById('outDot').style.background = '#10B981'
    document.getElementById('outText').textContent = 'Broadcasting'
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Signal Broadcast'
    document.getElementById('solvedMsg').textContent   = config.solvedMessage || ''
    document.getElementById('solvedBox').classList.add('show')
    fb.textContent = ''
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    fb.style.color = '#EF4444'
    fb.textContent = 'Not calibrated. Align each bar to the orange marker.'
  }
}

init()
</script>
</body>
</html>
