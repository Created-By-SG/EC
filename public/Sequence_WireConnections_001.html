<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;padding:14px 12px;gap:8px;min-height:100vh;}

.hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;}
.progress{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;}

.wire-layout{
  display:flex;
  flex:1;
  min-height:0;
  align-items:stretch;
}
.wire-col{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  gap:5px;
}
.canvas-col{
  width:52px;
  flex-shrink:0;
  position:relative;
}
.canvas-col canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.wire-node{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 10px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
  user-select:none;
}
.wire-node:active:not(.matched){background:var(--bg4);}
.wire-node.selected{border-color:#fff;background:rgba(255,255,255,0.07);}
.wire-node.matched{opacity:0.45;cursor:default;border-style:dashed;}

.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.wname{font-family:var(--font-mono);font-size:11px;}
.tchar{font-family:var(--font-mono);font-size:14px;font-weight:500;width:16px;text-align:center;flex-shrink:0;}
.tlabel{font-family:var(--font-mono);font-size:10px;color:var(--muted);flex:1;}

.feedback{font-family:var(--font-mono);font-size:11px;color:var(--red);text-align:center;min-height:14px;}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:6px;
  padding:14px 18px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;text-align:center;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="hint">Select a wire, then tap its terminal.</div>
<div class="progress" id="progressText">0 / 8 connected</div>

<div class="wire-layout">
  <div class="wire-col" id="wireLeft"></div>
  <div class="canvas-col"><canvas id="wireCanvas"></canvas></div>
  <div class="wire-col" id="wireRight"></div>
</div>

<div class="feedback" id="feedback"></div>
<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Board Rewired</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  pairs: [
    { wire:'Red',    color:'#c0392b', terminal:'F', terminalLabel:'Terminal F' },
    { wire:'Blue',   color:'#2980b9', terminal:'M', terminalLabel:'Terminal M' },
    { wire:'Green',  color:'#27ae60', terminal:'P', terminalLabel:'Terminal P' },
    { wire:'Yellow', color:'#f1c40f', terminal:'L', terminalLabel:'Terminal L' },
    { wire:'Orange', color:'#e67e22', terminal:'C', terminalLabel:'Terminal C' },
    { wire:'Purple', color:'#8e44ad', terminal:'B', terminalLabel:'Terminal B' },
    { wire:'White',  color:'#ecf0f1', terminal:'K', terminalLabel:'Terminal K' },
    { wire:'Cyan',   color:'#1abc9c', terminal:'H', terminalLabel:'Terminal H' },
  ],
  solvedTitle: 'Board Rewired',
  solvedMessage: 'All circuits connected. The speaker system has power.',
}

let selectedWire = null
let matched = {}
let locked = false
let leftOrder = []
let rightOrder = []

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
})

function init() {
  selectedWire = null; matched = {}; locked = false
  leftOrder  = [...config.pairs].sort(() => Math.random() - 0.5)
  rightOrder = [...config.pairs].sort(() => Math.random() - 0.5)
  build()
}

function build() {
  const left = document.getElementById('wireLeft')
  left.innerHTML = ''
  leftOrder.forEach(p => {
    const el = document.createElement('div')
    el.className = 'wire-node' + (matched[p.wire] ? ' matched' : '')
    el.id = 'w-' + p.wire
    el.onclick = () => selectWire(p.wire)
    el.innerHTML = `<div class="dot" style="background:${p.color}"></div><span class="wname">${p.wire}</span>`
    left.appendChild(el)
  })

  const right = document.getElementById('wireRight')
  right.innerHTML = ''
  rightOrder.forEach(p => {
    const isMatched = Object.values(matched).includes(p.terminal)
    const el = document.createElement('div')
    el.className = 'wire-node' + (isMatched ? ' matched' : '')
    el.id = 't-' + p.terminal
    el.onclick = () => connectTerminal(p.terminal)
    el.innerHTML = `<span class="tchar">${p.terminal}</span><span class="tlabel">${p.terminalLabel}</span>`
    right.appendChild(el)
  })

  setTimeout(drawWires, 60)
}

function selectWire(wire) {
  if (locked || matched[wire]) return
  selectedWire = wire
  document.querySelectorAll('.wire-node').forEach(el => el.classList.remove('selected'))
  document.getElementById('w-' + wire)?.classList.add('selected')
  document.getElementById('feedback').textContent = ''
}

function connectTerminal(terminal) {
  if (locked || !selectedWire) return
  const correct = config.pairs.find(p => p.wire === selectedWire)?.terminal
  if (correct === terminal) {
    matched[selectedWire] = terminal
    selectedWire = null
    build()
    document.getElementById('progressText').textContent =
      `${Object.keys(matched).length} / ${config.pairs.length} connected`
    if (Object.keys(matched).length === config.pairs.length) solve()
  } else {
    document.getElementById('feedback').textContent = 'Wrong terminal.'
    document.querySelectorAll('.wire-node').forEach(el => el.classList.remove('selected'))
    selectedWire = null
  }
}

function drawWires() {
  const canvas = document.getElementById('wireCanvas')
  const wrap   = canvas.parentElement
  canvas.width  = wrap.offsetWidth  || 52
  canvas.height = wrap.offsetHeight || 400
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  const W = canvas.width

  Object.entries(matched).forEach(([wire, terminal]) => {
    const lEl = document.getElementById('w-' + wire)
    const rEl = document.getElementById('t-' + terminal)
    if (!lEl || !rEl) return
    const cr = wrap.getBoundingClientRect()
    const lR = lEl.getBoundingClientRect()
    const rR = rEl.getBoundingClientRect()
    const y1 = lR.top + lR.height / 2 - cr.top
    const y2 = rR.top + rR.height / 2 - cr.top
    const wireColor = config.pairs.find(p => p.wire === wire)?.color || '#fff'
    ctx.beginPath()
    ctx.moveTo(0, y1)
    ctx.bezierCurveTo(W * 0.35, y1, W * 0.65, y2, W, y2)
    ctx.strokeStyle = wireColor
    ctx.lineWidth = 2.5
    ctx.shadowColor = wireColor
    ctx.shadowBlur = 5
    ctx.stroke()
    ctx.shadowBlur = 0
  })
}

window.addEventListener('resize', drawWires)

function solve() {
  locked = true
  document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Board Rewired'
  document.getElementById('solvedMsg').textContent   = config.solvedMessage || ''
  document.getElementById('solvedBox').classList.add('show')
  setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
}

init()
</script>
</body>
</html>
