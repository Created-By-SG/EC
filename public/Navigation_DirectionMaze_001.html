<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;--amber:#F59E0B;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px;}

.hint-text{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;max-width:300px;line-height:1.6;}
.hint-text strong{color:var(--amber);}

.maze-wrap{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px;display:inline-block;}
.maze-grid{display:grid;gap:4px;}

/* Larger cells for tap targets */
.maze-cell{
  width:48px;height:48px;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:background 0.1s, transform 0.1s;
  -webkit-user-select:none;user-select:none;
}
.maze-cell.wall{background:rgba(255,255,255,0.02);border:1px solid transparent;cursor:default;}
.maze-cell.open{background:var(--bg4);border:1px solid var(--border);}
.maze-cell.open:active{transform:scale(0.92);background:rgba(59,130,246,0.1);}
.maze-cell.player{background:rgba(59,130,246,0.18);border:1px solid var(--accent);cursor:default;}
.maze-cell.exit{background:rgba(16,185,129,0.12);border:1px solid var(--teal);cursor:default;}
.maze-cell.trap{background:rgba(239,68,68,0.14);border:1px solid var(--red);cursor:default;}
.maze-cell.visited{background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.07);}
.maze-cell.visited-trap{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);}
/* Tappable neighbours highlight */
.maze-cell.reachable{border:1px solid rgba(59,130,246,0.35);}

.bottom-row{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:320px;gap:8px;}

.move-counter{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;}

.reset-btn{
  padding:7px 14px;background:transparent;
  border:1px solid var(--border2);border-radius:6px;
  color:var(--muted);font-family:var(--font-mono);font-size:10px;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.reset-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

.feedback{font-family:var(--font-mono);font-size:11px;text-align:center;min-height:14px;color:var(--muted);}
.feedback.err{color:var(--red);}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:6px;
  padding:14px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;max-width:300px;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="hint-text">Navigate ● to ★. Tap an adjacent cell to move.<br><strong>Check the map item in your sack.</strong></div>

<div class="maze-wrap">
  <div class="maze-grid" id="mazeGrid"></div>
</div>

<div class="bottom-row">
  <span class="move-counter" id="moveCounter">Moves: 0</span>
  <button class="reset-btn" onclick="resetMaze()">Reset</button>
</div>

<div class="feedback" id="feedback"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Pattern Found</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
// 6x6 maze — 0=wall, 1=open, 2=trap, 3=exit
// Solution: R, D, R, D, D, R, D, R, R, D, R — 11 moves
// Without the map item showing trap positions this is very hard
let config = {
  cols: 6, rows: 6,
  grid: [
    [1, 1, 2, 1, 2, 1],
    [2, 1, 1, 2, 1, 1],
    [1, 2, 1, 1, 1, 2],
    [1, 1, 2, 1, 2, 1],
    [2, 1, 1, 1, 1, 1],
    [1, 2, 1, 2, 1, 3],
  ],
  startRow: 0, startCol: 0,
  solvedTitle: 'Pattern Found',
  solvedMessage: 'The trap positions form a pattern. The map was a clue within a clue.',
}

let pos = { r: 0, c: 0 }
let visited = new Set()
let moves = 0
let done = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; resetMaze() }
})

function key(r, c) { return `${r},${c}` }

function resetMaze() {
  pos = { r: config.startRow || 0, c: config.startCol || 0 }
  visited = new Set([key(pos.r, pos.c)])
  moves = 0; done = false
  document.getElementById('feedback').textContent = ''
  document.getElementById('feedback').className = 'feedback'
  document.getElementById('solvedBox').style.display = 'none'
  updateCounter()
  render()
}

function getNeighbours(r, c) {
  return [
    { r: r-1, c, dir:'up' }, { r: r+1, c, dir:'down' },
    { r, c: c-1, dir:'left' }, { r, c: c+1, dir:'right' }
  ].filter(n =>
    n.r >= 0 && n.r < config.rows &&
    n.c >= 0 && n.c < config.cols &&
    config.grid[n.r][n.c] !== 0
  )
}

function render() {
  const grid = document.getElementById('mazeGrid')
  grid.style.gridTemplateColumns = `repeat(${config.cols}, 48px)`
  grid.innerHTML = ''

  const neighbours = getNeighbours(pos.r, pos.c)
  const reachableKeys = new Set(neighbours.map(n => key(n.r, n.c)))

  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      const cell = document.createElement('div')
      cell.className = 'maze-cell'
      const isPlayer = pos.r === r && pos.c === c
      const val = config.grid[r][c]
      const wasVisited = visited.has(key(r, c)) && !isPlayer
      const isReachable = reachableKeys.has(key(r, c))

      if (val === 0) {
        cell.classList.add('wall')
      } else if (isPlayer) {
        cell.classList.add('player')
        cell.textContent = '●'
      } else if (val === 3) {
        cell.classList.add('exit')
        cell.textContent = '★'
        if (isReachable && !done) cell.addEventListener('click', () => moveTo(r, c))
      } else if (wasVisited && val === 2) {
        cell.classList.add('visited-trap')
        cell.textContent = '✕'
      } else if (wasVisited) {
        cell.classList.add('visited')
        if (isReachable && !done) { cell.classList.add('reachable'); cell.addEventListener('click', () => moveTo(r, c)) }
      } else {
        cell.classList.add('open')
        if (isReachable && !done) { cell.classList.add('reachable'); cell.addEventListener('click', () => moveTo(r, c)) }
      }

      grid.appendChild(cell)
    }
  }
}

function moveTo(r, c) {
  if (done) return
  const fb = document.getElementById('feedback')
  pos = { r, c }
  visited.add(key(r, c))
  moves++
  updateCounter()
  render()
  const val = config.grid[r][c]
  if (val === 2) {
    fb.textContent = 'Trap. Back to start.'
    fb.className = 'feedback err'
    setTimeout(resetMaze, 900)
  } else if (val === 3) {
    done = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Pattern Found'
    document.getElementById('solvedMsg').textContent = config.solvedMessage || ''
    document.getElementById('solvedBox').classList.add('show')
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    fb.textContent = ''; fb.className = 'feedback'
  }
}

function updateCounter() {
  document.getElementById('moveCounter').textContent = `Moves: ${moves}`
}

// Keyboard support too
document.addEventListener('keydown', e => {
  if (done) return
  const map = { ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1] }
  const d = map[e.key]
  if (!d) return
  e.preventDefault()
  const nr = pos.r + d[0], nc = pos.c + d[1]
  if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && config.grid[nr][nc] !== 0) moveTo(nr, nc)
})

resetMaze()
</script>
</body>
</html>
