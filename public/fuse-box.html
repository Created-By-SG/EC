<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),380px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:16px;}

.fuse-box{width:var(--card-w);background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.fuse-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.fuse-title{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.power-light{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background 0.3s,box-shadow 0.3s;}
.power-light.on{background:var(--teal);box-shadow:0 0 8px var(--teal);}
.power-light.fail{background:var(--red);box-shadow:0 0 8px var(--red);}
.fuses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:1px;background:var(--border);}
.fuse-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--bg);
  cursor:pointer;transition:background 0.15s;}
.fuse-item:hover{background:var(--bg3);}
.fuse-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.55);text-align:center;}
.fuse-track{width:28px;height:50px;background:rgba(255,255,255,0.06);border-radius:14px;position:relative;transition:background 0.2s;}
.fuse-track.on{background:rgba(16,185,129,0.2);}
.fuse-knob{position:absolute;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.25);transition:top 0.2s,background 0.2s;}
.fuse-knob.up{top:4px;background:var(--teal);}
.fuse-knob.down{top:26px;}
.fuse-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);height:14px;}

.seq-track{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;width:var(--card-w);}
.seq-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--muted);transition:all 0.2s;}
.seq-dot.done{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.4);color:var(--teal);}
.seq-dot.bad{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.4);color:#fca5a5;}

.feedback{font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);
  color:var(--muted);text-align:center;min-height:14px;width:var(--card-w);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="fuse-box">
  <div class="fuse-top">
    <span class="fuse-title">Fuse Panel</span>
    <div class="power-light" id="powerLight"></div>
  </div>
  <div class="fuses-grid" id="fusesGrid"></div>
</div>

<div class="seq-track" id="seqTrack"></div>
<div class="feedback" id="feedback"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Power Restored</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { fuses:['A','B','C'], answer:['A','B','C'], solvedTitle:'Power Restored', solvedMessage:'Correct.' }
let state = {}
let sequence = []
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
  if (e.data?.type === 'PUZZLE_SUBMIT') confirm()
})

function init() {
  state = Object.fromEntries(config.fuses.map(f => [f, false]))
  sequence = []
  solved = false
  renderFuses()
  renderSeq()
}

function renderFuses() {
  const grid = document.getElementById('fusesGrid')
  grid.innerHTML = ''
  config.fuses.forEach(name => {
    const on = state[name]
    const item = document.createElement('div')
    item.className = 'fuse-item'
    item.onclick = () => flip(name)
    item.innerHTML = `
      <div class="fuse-lbl">${name}</div>
      <div class="fuse-track${on?' on':''}">
        <div class="fuse-knob${on?' up':' down'}"></div>
      </div>
      <div class="fuse-num">${on ? sequence.indexOf(name)+1 : ''}</div>`
    grid.appendChild(item)
  })
}

function renderSeq() {
  const track = document.getElementById('seqTrack')
  track.innerHTML = ''
  config.answer.forEach((_, i) => {
    const dot = document.createElement('div')
    const filled = i < sequence.length
    const correct = filled && sequence[i] === config.answer[i]
    dot.className = 'seq-dot' + (filled ? (correct ? ' done' : ' bad') : '')
    dot.textContent = filled ? sequence[i].charAt(0) : i+1
    track.appendChild(dot)
  })
}

function flip(name) {
  if (solved) return
  if (state[name]) {
    state[name] = false
    sequence = sequence.filter(s => s !== name)
  } else {
    state[name] = true
    sequence = [...sequence, name]
  }
  document.getElementById('feedback').textContent = ''
  renderFuses()
  renderSeq()
}

function confirm() {
  if (solved) return
  if (sequence.length < config.answer.length) {
    document.getElementById('feedback').textContent = 'Flip all switches in the correct order first.'
    return
  }
  const correct = config.answer.every((v, i) => sequence[i] === v)
  if (correct) {
    solved = true
    document.getElementById('powerLight').classList.add('on')
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Power Restored'
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    document.getElementById('powerLight').classList.add('fail')
    document.getElementById('feedback').textContent = 'Wrong sequence. Reset and try again.'
    renderSeq()
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
    setTimeout(() => {
      state = Object.fromEntries(config.fuses.map(f => [f, false]))
      sequence = []
      document.getElementById('powerLight').className = 'power-light'
      renderFuses()
      renderSeq()
    }, 800)
  }
}

init()
</script>
</body>
</html>
