<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;--amber:#F59E0B;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;}

.scanner{width:100%;max-width:340px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.scanner-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,0,0,0.25);}
.scanner-brand{font-family:var(--font-mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.scanner-status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:9px;color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1.4s ease-in-out infinite;}
.status-dot.locked{background:var(--teal);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

.scope{width:100%;height:110px;background:#020408;}
.scope canvas{display:block;width:100%;height:110px;}

.controls{padding:18px 16px 22px;display:flex;flex-direction:column;gap:22px;}
.ch{display:flex;flex-direction:column;gap:10px;}
.ch-header{display:flex;align-items:center;justify-content:space-between;}
.ch-label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.ch-value{display:flex;align-items:baseline;gap:3px;}
.ch-num{font-family:var(--font-mono);font-size:20px;font-weight:500;color:var(--text);min-width:34px;text-align:right;}
.ch-unit{font-family:var(--font-mono);font-size:9px;color:var(--muted);}

.sl-wrap{padding:8px 0;}
.sl-track{position:relative;height:6px;background:var(--bg4);border-radius:3px;}
input[type=range]{
  position:absolute;top:50%;left:0;width:100%;height:48px;
  transform:translateY(-50%);
  -webkit-appearance:none;appearance:none;
  background:transparent;outline:none;cursor:pointer;margin:0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:30px;height:30px;border-radius:50%;
  background:var(--accent);
  border:3px solid var(--bg);
  box-shadow:0 0 0 2px var(--accent);
  transition:transform 0.1s;
}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15);}
input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);}
.sl-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:3px;pointer-events:none;transition:width 0.05s;}

.submit-btn{
  width:100%;max-width:340px;padding:14px;background:var(--accent);border:none;border-radius:8px;
  color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}

.feedback{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;min-height:14px;max-width:340px;}

.solved-box{
  display:none;flex-direction:column;align-items:center;gap:6px;
  padding:14px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;max-width:340px;width:100%;
}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="scanner">
  <div class="scanner-top">
    <span class="scanner-brand">Police Scanner</span>
    <div class="scanner-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Scanning...</span>
    </div>
  </div>
  <div class="scope"><canvas id="scopeCanvas"></canvas></div>
  <div class="controls">
    <div class="ch">
      <div class="ch-header">
        <span class="ch-label">Frequency</span>
        <div class="ch-value"><span class="ch-num" id="freqNum">55</span><span class="ch-unit">Hz</span></div>
      </div>
      <div class="sl-wrap">
        <div class="sl-track">
          <div class="sl-fill" id="freqFill" style="width:25%"></div>
          <input type="range" id="freqSlider" min="40" max="110" value="55" oninput="update()">
        </div>
      </div>
    </div>
    <div class="ch">
      <div class="ch-header">
        <span class="ch-label">Amplitude</span>
        <div class="ch-value"><span class="ch-num" id="ampNum">25</span><span class="ch-unit">%</span></div>
      </div>
      <div class="sl-wrap">
        <div class="sl-track">
          <div class="sl-fill" id="ampFill" style="width:10%"></div>
          <input type="range" id="ampSlider" min="20" max="70" value="25" oninput="update()">
        </div>
      </div>
    </div>
  </div>
</div>

<button class="submit-btn" id="submitBtn" onclick="check()">Intercept Signal</button>
<div class="feedback" id="feedback"></div>
<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Signal Intercepted</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
// Target is 73Hz / 42% — both within the shorter ranges (40-110 / 20-70)
let config = { targetFreq:73, targetAmp:42, tolerance:1, solvedTitle:'Signal Intercepted', solvedMessage:'Broadcast channel open. Ready to transmit.' }
let solved = false
const FREQ_MIN=40, FREQ_MAX=110, AMP_MIN=20, AMP_MAX=70

window.addEventListener('message', e => { if (e.data?.type === 'PUZZLE_CONFIG') { config={...config,...e.data.config}; update() } })

const canvas = document.getElementById('scopeCanvas')
const ctx = canvas.getContext('2d')
function resize() { canvas.width = canvas.offsetWidth||340; canvas.height=110 }
window.addEventListener('resize', ()=>{ resize(); draw() })
resize()

function update() {
  const f = +document.getElementById('freqSlider').value
  const a = +document.getElementById('ampSlider').value
  document.getElementById('freqNum').textContent = f
  document.getElementById('ampNum').textContent  = a
  document.getElementById('freqFill').style.width = ((f-FREQ_MIN)/(FREQ_MAX-FREQ_MIN)*100)+'%'
  document.getElementById('ampFill').style.width  = ((a-AMP_MIN)/(AMP_MAX-AMP_MIN)*100)+'%'
  draw()
  document.getElementById('feedback').textContent = ''
}

function draw() {
  const W=canvas.width, H=canvas.height, mid=H/2
  const f=+document.getElementById('freqSlider').value
  const a=+document.getElementById('ampSlider').value
  ctx.clearRect(0,0,W,H)
  ctx.strokeStyle='rgba(59,130,246,0.06)'; ctx.lineWidth=1
  for(let x=0;x<W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.beginPath(); ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1.5
  for(let x=0;x<=W;x++){const y=mid+(config.targetAmp*0.38)*Math.sin(x*config.targetFreq*0.0018); x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.stroke()
  ctx.beginPath(); ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2
  for(let x=0;x<=W;x++){const y=mid+(a*0.38)*Math.sin(x*f*0.0018); x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.stroke()
}

function check() {
  if(solved) return
  const f=+document.getElementById('freqSlider').value
  const a=+document.getElementById('ampSlider').value
  const fb=document.getElementById('feedback')
  if(Math.abs(f-config.targetFreq)<=config.tolerance && Math.abs(a-config.targetAmp)<=config.tolerance){
    solved=true
    document.getElementById('statusDot').className='status-dot locked'
    document.getElementById('statusText').textContent='Locked'
    document.getElementById('submitBtn').disabled=true
    document.getElementById('solvedTitle').textContent=config.solvedTitle||'Signal Intercepted'
    document.getElementById('solvedMsg').textContent=config.solvedMessage||''
    document.getElementById('solvedBox').classList.add('show')
    fb.textContent=''
    setTimeout(()=>window.parent.postMessage({type:'PUZZLE_SOLVED'},'*'),900)
  } else {
    fb.style.color='#EF4444'
    fb.textContent='Signal not aligned. Adjust both channels.'
  }
}
update()
</script>
</body>
</html>
