<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg2:#0D1526;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--accent-light:#93C5FD;--accent-dim:rgba(59,130,246,0.15);--accent-border:rgba(59,130,246,0.3);
  --teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),340px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:16px;}

.dials{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.dial{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dial-btn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px 12px;
  transition:color 0.15s;border-radius:4px;}
.dial-btn:hover{color:var(--text);background:var(--bg3);}
.dial-digit{width:52px;height:60px;display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:500;font-family:var(--font-mono);color:var(--text);
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;letter-spacing:0.05em;
  transition:border-color 0.15s;}
.dial-digit.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.feedback{font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);
  color:var(--red);text-align:center;min-height:14px;width:var(--card-w);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="dials" id="dials"></div>
<div class="feedback" id="feedback"></div>
<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Confirmed</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { scramble:[0,0,0,0], answer:[1,2,3,4], solvedTitle:'Confirmed', solvedMessage:'Correct.' }
let values = []
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
  if (e.data?.type === 'PUZZLE_SUBMIT') check()
})

function init() {
  values = [...config.scramble]
  solved = false
  render()
}

function render() {
  const c = document.getElementById('dials')
  c.innerHTML = ''
  values.forEach((v, i) => {
    const d = document.createElement('div')
    d.className = 'dial'
    d.innerHTML = `
      <button class="dial-btn" onclick="change(${i},1)">▲</button>
      <div class="dial-digit" id="digit-${i}">${v}</div>
      <button class="dial-btn" onclick="change(${i},-1)">▼</button>`
    c.appendChild(d)
  })
}

function change(i, dir) {
  if (solved) return
  values[i] = (values[i] + dir + 10) % 10
  document.getElementById(`digit-${i}`).textContent = values[i]
}

function check() {
  if (solved) return
  const correct = config.answer.every((v, i) => values[i] === v)
  if (correct) {
    solved = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Confirmed'
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('dials').style.opacity = '0.4'
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    document.getElementById('feedback').textContent = 'Not quite. Try again.'
    document.querySelectorAll('.dial-digit').forEach(d => {
      d.classList.remove('shake'); void d.offsetWidth; d.classList.add('shake')
    })
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

init()
</script>
</body>
</html>
