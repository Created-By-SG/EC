<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;
  --accent:#3B82F6;--accent-light:#93C5FD;--teal:#10B981;--red:#EF4444;
  --border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),340px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:16px;}

.hint-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;width:var(--card-w);}

.uv-area{width:var(--card-w);height:160px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;position:relative;overflow:hidden;cursor:crosshair;user-select:none;}
.uv-document{position:absolute;inset:0;padding:16px;display:flex;flex-direction:column;gap:6px;}
.uv-doc-line{height:8px;background:rgba(255,255,255,0.06);border-radius:2px;}
.uv-doc-line:nth-child(2){width:75%;}
.uv-doc-line:nth-child(3){width:90%;}
.uv-doc-line:nth-child(4){width:60%;}
.uv-doc-line:nth-child(5){width:80%;}
.uv-light{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.uv-ink{position:absolute;inset:0;pointer-events:none;font-family:var(--font-mono);
  font-size:18px;font-weight:600;letter-spacing:6px;color:#c084fc;
  display:flex;align-items:center;justify-content:center;opacity:0;clip-path:circle(0px at 50% 50%);transition:opacity 0.1s;}

.code-input{width:var(--card-w);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:10px 14px;font-family:var(--font-mono);font-size:14px;color:var(--text);outline:none;
  letter-spacing:3px;text-transform:uppercase;text-align:center;}
.code-input:focus{border-color:rgba(59,130,246,0.5);}

.feedback{font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);
  color:var(--red);text-align:center;min-height:14px;width:var(--card-w);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<p class="hint-text">Scan the document with the UV torch. Enter what you find.</p>

<div class="uv-area" id="uvArea"
  onmousemove="moveLight(event)" ontouchmove="moveLight(event)"
  onmouseenter="showLight()" ontouchstart="showLight()">
  <div class="uv-document">
    <div class="uv-doc-line"></div>
    <div class="uv-doc-line"></div>
    <div class="uv-doc-line"></div>
    <div class="uv-doc-line"></div>
    <div class="uv-doc-line"></div>
  </div>
  <div class="uv-light" id="uvLight"></div>
  <div class="uv-ink" id="uvInk">GOLD</div>
</div>

<input class="code-input" id="codeInput" maxlength="10" placeholder="ENTER CODE"
  autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
<div class="feedback" id="feedback"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Code Verified</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { hiddenCode:'GOLD', uvInkText:'GOLD', solvedTitle:'Code Verified', solvedMessage:'Hidden message confirmed.' }
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
  if (e.data?.type === 'PUZZLE_SUBMIT') check()
})

function init() {
  solved = false
  document.getElementById('uvInk').textContent = config.uvInkText || config.hiddenCode
  document.getElementById('codeInput').value = ''
  document.getElementById('feedback').textContent = ''
  document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') check() })
}

function moveLight(e) {
  e.preventDefault()
  const area = document.getElementById('uvArea')
  const rect = area.getBoundingClientRect()
  const cx = e.touches ? e.touches[0].clientX : e.clientX
  const cy = e.touches ? e.touches[0].clientY : e.clientY
  const x = cx - rect.left, y = cy - rect.top
  const light = document.getElementById('uvLight')
  const ink = document.getElementById('uvInk')
  light.style.opacity = '1'
  light.style.background = `radial-gradient(circle 70px at ${x}px ${y}px, rgba(168,85,247,0.18) 0%, transparent 70%)`
  ink.style.opacity = '1'
  ink.style.clipPath = `circle(60px at ${x}px ${y}px)`
}

function showLight() {
  document.getElementById('uvLight').style.opacity = '0.5'
}

function check() {
  if (solved) return
  const val = document.getElementById('codeInput').value.trim().toUpperCase()
  if (val === config.hiddenCode.toUpperCase()) {
    solved = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Code Verified'
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.querySelector('.code-input').style.display = 'none'
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  } else {
    document.getElementById('feedback').textContent = 'Invalid code. Keep searching.'
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

init()
</script>
</body>
</html>
