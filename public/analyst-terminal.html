<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;
  --teal:#10B981;--red:#EF4444;
  --border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),400px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-mono);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;justify-content:center;
  padding:16px;gap:16px;}

.terminal{width:100%;max-width:var(--card-w);align-self:center;
  background:#020509;border:1px solid var(--border2);border-radius:10px;overflow:hidden;
  display:flex;flex-direction:column;flex:1;min-height:0;}
.term-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border2);background:var(--bg3);flex-shrink:0;}
.term-dot{width:8px;height:8px;border-radius:50%;}
.term-dot-r{background:#ef4444;}.term-dot-y{background:#eab308;}.term-dot-g{background:#22c55e;}
.term-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-left:4px;}
.term-box{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:3px;}
.term-box::-webkit-scrollbar{width:3px;}
.term-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.term-line{font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-all;}
.term-input-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border2);flex-shrink:0;}
.term-prompt{font-size:12px;color:#22c55e;flex-shrink:0;}
.term-input{flex:1;background:none;border:none;outline:none;font-family:var(--font-mono);font-size:12px;color:#22c55e;caret-color:#22c55e;}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:100%;max-width:var(--card-w);align-self:center;}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="terminal">
  <div class="term-bar">
    <div class="term-dot term-dot-r"></div>
    <div class="term-dot term-dot-y"></div>
    <div class="term-dot term-dot-g"></div>
    <span class="term-title">Terminal</span>
  </div>
  <div class="term-box" id="termBox">
    <div class="term-line" style="color:#6B7A99">Type HELP for available commands.</div>
  </div>
  <div class="term-input-row" id="termInputRow">
    <span class="term-prompt">>&nbsp;</span>
    <input class="term-input" id="cmdInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="enter command">
  </div>
</div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Access Granted</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = {
  files: {
    'manifest.txt': 'SHIPMENT 4A: 50 crates\nDESTINATION: Southport\nSTATUS: Pending',
    'note.log': 'I keep forgetting the override code. I wrote it on the bottom of my coffee mug. It is 7734.',
  },
  overrideCode: '7734',
  solvedTitle: 'Access Granted',
  solvedMessage: 'System override successful.',
}
let solved = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
})

function init() {
  solved = false
  document.getElementById('termBox').innerHTML = '<div class="term-line" style="color:#6B7A99">Type HELP for available commands.</div>'
  document.getElementById('cmdInput').addEventListener('keydown', onKey)
  document.getElementById('cmdInput').focus()
}

function onKey(e) {
  if (e.key !== 'Enter') return
  const raw = e.target.value.trim()
  e.target.value = ''
  if (!raw) return
  appendLog('> ' + raw, '#22c55e')
  processCmd(raw.toLowerCase().split(' '))
  const box = document.getElementById('termBox')
  box.scrollTop = box.scrollHeight
}

function processCmd(args) {
  const cmd = args[0]
  switch (cmd) {
    case 'help':
      appendLog('Commands: HELP  DIR  READ [file]  OVERRIDE [code]')
      break
    case 'dir':
      appendLog('Files:')
      Object.keys(config.files).forEach(f => appendLog('  ' + f))
      break
    case 'read':
      if (args.length < 2) { appendLog('Usage: READ [filename]', '#ef4444'); break }
      const file = config.files[args[1]]
      if (file) { appendLog('--- ' + args[1] + ' ---'); appendLog(file, '#aab4cc') }
      else appendLog('File not found: ' + args[1], '#ef4444')
      break
    case 'override':
      if (args[1] === config.overrideCode.toLowerCase()) {
        appendLog('ACCESS GRANTED.', '#fff')
        solve()
      } else {
        appendLog('ACCESS DENIED. Invalid code.', '#ef4444')
        window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
      }
      break
    default:
      appendLog("Unknown command: '" + cmd + "'. Type HELP.", '#ef4444')
  }
}

function appendLog(text, color = '#22c55e') {
  const line = document.createElement('div')
  line.className = 'term-line'
  line.style.color = color
  line.textContent = text
  document.getElementById('termBox').appendChild(line)
}

function solve() {
  solved = true
  document.getElementById('termInputRow').style.display = 'none'
  document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Access Granted'
  document.getElementById('solvedMsg').textContent = config.solvedMessage
  document.getElementById('solvedBox').classList.add('show')
  setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
}

init()
</script>
</body>
</html>
