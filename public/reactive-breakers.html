<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),340px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:16px;}

.hint-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;
  max-width:var(--card-w);line-height:1.6;}

.breaker-board{display:flex;justify-content:center;gap:12px;padding:20px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;}
.breaker-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.breaker-light{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.08);
  border:1px solid var(--border2);transition:all 0.25s;}
.breaker-light.on{background:var(--teal);border-color:var(--teal);box-shadow:0 0 10px rgba(16,185,129,0.5);}
.breaker-switch{width:30px;height:56px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  border-radius:6px;position:relative;cursor:pointer;transition:background 0.2s;}
.breaker-switch:hover{background:var(--bg4);}
.breaker-switch.on{background:rgba(59,130,246,0.1);}
.breaker-thumb{width:24px;height:22px;background:var(--muted);border-radius:3px;
  position:absolute;left:2px;top:2px;transition:top 0.2s,background 0.2s;}
.breaker-switch.on .breaker-thumb{top:30px;background:var(--accent);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<p class="hint-text">Flipping a breaker surges the adjacent circuits too. Get all lights green.</p>
<div class="breaker-board" id="breakerBoard"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Power Stabilized</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { initialState:[false,true,false,false,false],
  solvedTitle:'Power Stabilized', solvedMessage:'The main grid is back online.' }
let breakers = []
let locked = false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
})

function init() {
  breakers = [...config.initialState]
  locked = false
  build()
}

function build() {
  const board = document.getElementById('breakerBoard')
  board.innerHTML = ''
  breakers.forEach((state, i) => {
    const wrap = document.createElement('div')
    wrap.className = 'breaker-wrap'
    const light = document.createElement('div')
    light.className = 'breaker-light' + (state ? ' on' : '')
    light.id = 'blight-' + i
    const sw = document.createElement('div')
    sw.className = 'breaker-switch' + (state ? ' on' : '')
    sw.id = 'bswitch-' + i
    sw.onclick = () => toggle(i)
    const thumb = document.createElement('div')
    thumb.className = 'breaker-thumb'
    sw.appendChild(thumb)
    wrap.append(light, sw)
    board.appendChild(wrap)
  })
}

function flip(i) {
  breakers[i] = !breakers[i]
  document.getElementById('blight-'+i).className = 'breaker-light' + (breakers[i] ? ' on' : '')
  document.getElementById('bswitch-'+i).className = 'breaker-switch' + (breakers[i] ? ' on' : '')
}

function toggle(i) {
  if (locked) return
  flip(i)
  if (i > 0) flip(i-1)
  if (i < breakers.length-1) flip(i+1)
  if (breakers.every(b => b)) {
    locked = true
    document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Power Stabilized'
    document.getElementById('solvedMsg').textContent = config.solvedMessage
    document.getElementById('solvedBox').classList.add('show')
    document.getElementById('breakerBoard').style.opacity = '0.4'
    setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
  }
}

init()
</script>
</body>
</html>
