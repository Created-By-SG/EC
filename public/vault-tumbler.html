<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080E1A;--bg3:#131E33;--bg4:#1A2840;
  --accent:#3B82F6;--teal:#10B981;--red:#EF4444;
  --border:rgba(59,130,246,0.1);--border2:rgba(59,130,246,0.22);
  --text:#F0F4FF;--muted:#6B7A99;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --card-w:min(calc(100vw - 32px),340px);
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:16px;}

.combo-steps{display:flex;gap:8px;justify-content:center;width:var(--card-w);flex-wrap:wrap;}
.combo-step{font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);transition:all 0.2s;}
.combo-step.active{border-color:var(--accent);color:var(--accent);}
.combo-step.done{border-color:rgba(16,185,129,0.4);color:var(--teal);background:rgba(16,185,129,0.08);}

.dial-wrap{position:relative;width:200px;height:200px;flex-shrink:0;}
.dial-ring{position:absolute;inset:0;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);overflow:hidden;touch-action:none;}
.dial-face{width:100%;height:100%;border-radius:50%;cursor:grab;user-select:none;}
.dial-face:active{cursor:grabbing;}
.dial-notch{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:3px;height:16px;background:var(--accent);border-radius:2px;z-index:10;}

.dial-readout{text-align:center;}
.dial-val{font-family:var(--font-mono);font-size:2rem;font-weight:500;color:var(--text);}
.dial-dir{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

.feedback{font-family:var(--font-mono);font-size:clamp(10px,2.8vw,11px);
  text-align:center;min-height:14px;width:var(--card-w);}

.solved-box{display:none;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.2);border-radius:10px;
  text-align:center;width:var(--card-w);}
.solved-box.show{display:flex;}
.solved-title{font-family:var(--font-mono);font-size:clamp(9px,2.5vw,10px);letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
.solved-msg{font-size:clamp(11px,3vw,12px);color:rgba(255,255,255,0.6);line-height:1.5;}
</style>
</head>
<body>

<div class="combo-steps" id="comboSteps"></div>

<div class="dial-wrap">
  <div class="dial-ring">
    <div class="dial-face" id="vaultDial"
      onmousedown="startRotate(event)" ontouchstart="startRotate(event)">
    </div>
  </div>
  <div class="dial-notch"></div>
</div>

<div class="dial-readout">
  <div class="dial-val" id="dialVal">0</div>
  <div class="dial-dir" id="dialDir"></div>
</div>

<div class="feedback" id="vaultFb"></div>

<div class="solved-box" id="solvedBox">
  <div class="solved-title" id="solvedTitle">Unlocked</div>
  <div class="solved-msg" id="solvedMsg"></div>
</div>

<script>
let config = { combo:[{dir:'L',val:30},{dir:'R',val:15}], solvedTitle:'Unlocked', solvedMessage:'The tumblers fall into place.' }
let vStep=0, vRotation=0, vStartAngle=0, vDragging=false, vLocked=false

window.addEventListener('message', e => {
  if (e.data?.type === 'PUZZLE_CONFIG') { config = { ...config, ...e.data.config }; init() }
})

function init() {
  vStep=0; vRotation=0; vDragging=false; vLocked=false
  buildTicks(); buildSteps(); updateDir()
}

function buildTicks() {
  const dial = document.getElementById('vaultDial')
  dial.innerHTML = ''
  for (let i = 0; i < 40; i++) {
    const deg = i * 9
    const tick = document.createElement('div')
    tick.style.cssText = `position:absolute;width:100%;height:100%;top:0;left:0;display:flex;justify-content:center;transform:rotate(${deg}deg);pointer-events:none;`
    const pip = document.createElement('div')
    pip.style.cssText = `width:${i%5===0?3:2}px;height:${i%5===0?10:6}px;background:${i%5===0?'rgba(107,122,153,0.6)':'rgba(107,122,153,0.25)'};margin-top:4px;border-radius:1px;`
    tick.appendChild(pip)
    if (i % 5 === 0) {
      const lbl = document.createElement('span')
      lbl.textContent = i
      lbl.style.cssText = `position:absolute;top:20px;font-family:var(--font-mono);font-size:9px;color:var(--muted);transform:rotate(-${deg}deg);`
      tick.appendChild(lbl)
    }
    dial.appendChild(tick)
  }
}

function buildSteps() {
  const el = document.getElementById('comboSteps')
  el.innerHTML = ''
  config.combo.forEach((step, i) => {
    const s = document.createElement('div')
    s.id = 'vstep'+i
    s.className = 'combo-step' + (i === 0 ? ' active' : '')
    s.textContent = step.val + ' ' + (step.dir==='L' ? '←' : '→')
    el.appendChild(s)
  })
}

function updateDir() {
  document.getElementById('dialDir').textContent = vStep < config.combo.length
    ? (config.combo[vStep].dir==='L' ? '← turn left' : 'turn right →') : ''
}

function getAngle(e) {
  const rect = document.getElementById('vaultDial').getBoundingClientRect()
  const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2
  const ex = e.touches ? e.touches[0].clientX : e.clientX
  const ey = e.touches ? e.touches[0].clientY : e.clientY
  return Math.atan2(ey-cy, ex-cx) * (180/Math.PI)
}

function currentVal() { return Math.round(((vRotation%360)+360)%360 / 9) % 40 }

function startRotate(e) {
  if (vLocked) return
  e.preventDefault()
  vDragging = true
  vStartAngle = getAngle(e) - vRotation
  document.addEventListener('mousemove', onRotate)
  document.addEventListener('mouseup', stopRotate)
  document.addEventListener('touchmove', onRotate, {passive:false})
  document.addEventListener('touchend', stopRotate)
}

function onRotate(e) {
  if (!vDragging) return
  e.preventDefault()
  vRotation = getAngle(e) - vStartAngle
  document.getElementById('vaultDial').style.transform = `rotate(${vRotation}deg)`
  document.getElementById('dialVal').textContent = currentVal()
  updateDir()
}

function stopRotate() {
  if (!vDragging) return
  vDragging = false
  document.removeEventListener('mousemove', onRotate)
  document.removeEventListener('mouseup', stopRotate)
  document.removeEventListener('touchmove', onRotate)
  document.removeEventListener('touchend', stopRotate)
  if (vStep >= config.combo.length || vLocked) return
  const val = currentVal(), target = config.combo[vStep]
  const fb = document.getElementById('vaultFb')
  if (val === target.val) {
    document.getElementById('vstep'+vStep).className = 'combo-step done'
    vStep++
    if (vStep < config.combo.length) {
      document.getElementById('vstep'+vStep).className = 'combo-step active'
      fb.style.color = 'var(--teal)'
      fb.textContent = '✓ Step ' + vStep + ' done. Next: ' + config.combo[vStep].val + ' ' + (config.combo[vStep].dir==='L' ? 'Left' : 'Right')
      updateDir()
    } else {
      vLocked = true
      document.getElementById('dialDir').textContent = '✓ unlocked'
      fb.textContent = ''
      document.getElementById('solvedTitle').textContent = config.solvedTitle || 'Unlocked'
      document.getElementById('solvedMsg').textContent = config.solvedMessage
      document.getElementById('solvedBox').classList.add('show')
      setTimeout(() => window.parent.postMessage({ type: 'PUZZLE_SOLVED' }, '*'), 900)
    }
  } else {
    fb.style.color = 'var(--red)'
    fb.textContent = 'Landed on ' + val + ' — needed ' + target.val + '. Try again.'
    window.parent.postMessage({ type: 'PUZZLE_WRONG' }, '*')
  }
}

init()
</script>
</body>
</html>
